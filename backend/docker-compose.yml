services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hos
      POSTGRES_PASSWORD: hos
      POSTGRES_DB: hos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hos"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hos:hos@db:5432/hos
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      # ORS_API_KEY: ${ORS_API_KEY:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
