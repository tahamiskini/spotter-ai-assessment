services:
  - type: web
    name: hos-trip-planner-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/healthcheck
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false            # set to your Vercel URL
      - key: ORS_API_KEY
        sync: false            # optional; offline estimator used if unset
      - key: DATABASE_URL
        fromDatabase:
          name: hos-postgres
          property: connectionString

databases:
  - name: hos-postgres
    plan: free
